spring:
  application:
    name: financial-transaction-authorization-service

  profiles:
    default: local

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/db_financial_transactions_authorization}
    username: ${DATABASE_USERNAME:user_financial_transactions_authorization}
    password: ${DATABASE_PASSWORD:password_financial_transactions_authorization}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: ${DATABASE_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${DATABASE_MINIMUM_IDLE:2}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${DATABASE_VALIDATION_TIMEOUT_MS:1000}
      idle-timeout: ${DATABASE_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DATABASE_MAX_LIFETIME_MS:1800000}

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  docker:
    compose:
      enabled: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:sa-east-1}

      sqs:
        enabled: true
        observation-enabled: true
        listener:
          max-inflight-messages-per-queue: ${SQS_MAX_INFLIGHT_MESSAGES:10}
          max-messages-per-poll: ${SQS_MAX_MESSAGES_PER_POLL:10}
          poll-timeout: ${SQS_POLL_TIMEOUT:10s}

  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

server:
  shutdown: graceful
  tomcat:
    accept-count: ${SERVER_ACCEPT_COUNT:100}
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:5s}
    threads:
      max: ${SERVER_MAX_THREADS:200}
      min-spare: ${SERVER_MIN_SPARE_THREADS:10}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include:
            - livenessState
            - ping
        readiness:
          include:
            - readinessState
            - db

  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}

    distribution:
      percentiles-histogram:
        http.server.requests: true

  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}

    export:
      otlp:
        enabled: true

  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      deployment.environment.name: ${ENVIRONMENT:local}

    tracing:
      export:
        otlp:
          endpoint: ${OTEL_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

  otlp:
    metrics:
      export:
        enabled: true
        url: ${OTEL_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: 10s

logging:
  include-application-name: false

  level:
    com.osmarin.financial.transaction.authorization: ${APPLICATION_LOG_LEVEL:INFO}

  pattern:
    correlation: "%replace([${spring.application.name:},%X{traceId:-},%X{spanId:-}]){',+(?=\\])',''} "

application:
  messaging:
    sqs:
      account-created-queue: ${ACCOUNT_CREATED_QUEUE:http://localhost:4566/000000000000/conta-bancaria-criada}
