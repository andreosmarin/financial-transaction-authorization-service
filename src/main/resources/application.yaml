spring:
  application:
    name: financial-transaction-authorization-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/db_financial_transactions_authorization}
    username: ${DATABASE_USERNAME:user_financial_transactions_authorization}
    password: ${DATABASE_PASSWORD:password_financial_transactions_authorization}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false