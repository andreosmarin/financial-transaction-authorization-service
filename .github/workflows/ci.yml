name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, test and quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
          cache: maven

      - name: Run tests and package
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Validate SonarQube configuration
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: |
          : "${SONAR_HOST_URL:?Repository variable SONAR_HOST_URL is required}"
          : "${SONAR_PROJECT_KEY:?Repository variable SONAR_PROJECT_KEY is required}"
          : "${SONAR_TOKEN:?Repository secret SONAR_TOKEN is required}"

      - name: Analyze with SonarQube and wait for Quality Gate
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: >-
          ./mvnw --batch-mode --no-transfer-progress sonar:sonar
          -Dsonar.projectKey="${SONAR_PROJECT_KEY}"
          -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=300

      - name: Upload application artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: application-jar-${{ github.sha }}
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7
