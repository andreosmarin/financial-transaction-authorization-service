version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:15'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 3
